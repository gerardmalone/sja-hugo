{{ $featuredImage := partial "func/GetFeaturedImage.html" . }}
<article class="summary-card summary-card--with-image">
  {{ with $featuredImage }}
    <a class="summary-card__image" href="{{ $.RelPermalink }}">
      <img src="{{ . }}" alt="Image for {{ $.Title }}">
    </a>
  {{ end }}
  <div class="summary-card__body">
    <p class="summary-card__kicker">{{ with .CurrentSection.Title }}{{ . }}{{ else }}Parish page{{ end }}</p>
    <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
    <p>{{ .Summary | plainify | truncate 180 }}</p>
    <a class="summary-card__link" href="{{ .RelPermalink }}">Read more</a>
  </div>
</article>
